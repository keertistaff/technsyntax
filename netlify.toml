[build]
  publish = "."

[[redirects]]
  from = "http://technsyntax.site/*"
  to = "https://www.technsyntax.site/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://technsyntax.site/*"
  to = "https://www.technsyntax.site/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
